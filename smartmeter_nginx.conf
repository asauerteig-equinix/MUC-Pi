server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # Hostname des Raspberry Pi
    server_name muc localhost 127.0.0.1 _;

    # Root für statische Dateien
    root /home/pi/smartmeter_project;

    # Max Upload Größe
    client_max_body_size 10M;

    # Logging
    access_log /var/log/nginx/smartmeter_access.log;
    error_log /var/log/nginx/smartmeter_error.log;

    # Reverse Proxy zu Flask auf Port 5000
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # WebSocket Support (falls später benötigt)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Statische Dateien direkt servieren (schneller)
    location /static/ {
        alias /home/pi/smartmeter_project/static/;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Health Check
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
