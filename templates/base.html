<!DOCTYPE html>
<html lang="de" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smartmeter Dashboard{% endblock %}</title>
    
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Plotly.js für Diagramme -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light sticky-top">
        <div class="container-lg">
            <a class="navbar-brand" href="/">
                <i class="bi bi-thermometer"></i> <strong>Smartmeter Dashboard</strong>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">
                            <i class="bi bi-graph-up"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/sensors">
                            <i class="bi bi-sliders"></i> Sensoren
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/data">
                            <i class="bi bi-database"></i> Daten
                        </a>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link btn btn-link" id="themeToggleBtn" onclick="toggleTheme()">
                            <i class="bi bi-moon-stars"></i> Dunkel
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container-lg py-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-light border-top mt-5 py-3">
        <div class="container-lg text-center text-muted small">
            <p>Smartmeter Monitoring System &copy; 2025</p>
        </div>
    </footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Theme Toggle - Inline für zuverlässige Ausführung -->
    <script>
    // Theme Toggle Functions
    function initTheme() {
        const savedTheme = getCookie('theme') || 'light';
        applyTheme(savedTheme);
    }

    function applyTheme(theme) {
        document.documentElement.setAttribute('data-bs-theme', theme);
        document.body.setAttribute('data-bs-theme', theme);
        setCookie('theme', theme, 365);
        updateThemeButton(theme);
        
        // Auch navbar und footer anpassen
        const navbar = document.querySelector('.navbar');
        const footer = document.querySelector('footer');
        if (navbar) {
            navbar.classList.toggle('navbar-dark', theme === 'dark');
            navbar.classList.toggle('navbar-light', theme === 'light');
            navbar.classList.toggle('bg-dark', theme === 'dark');
            navbar.classList.toggle('bg-light', theme === 'light');
        }
        if (footer) {
            footer.classList.toggle('bg-dark', theme === 'dark');
            footer.classList.toggle('bg-light', theme === 'light');
        }
    }

    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-bs-theme') || 'light';
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        applyTheme(newTheme);
    }

    function updateThemeButton(theme) {
        const btn = document.getElementById('themeToggleBtn');
        if (btn) {
            btn.innerHTML = theme === 'light' 
                ? '<i class="bi bi-moon-stars"></i> Dunkel' 
                : '<i class="bi bi-sun"></i> Hell';
        }
    }

    function setCookie(name, value, days) {
        const expires = new Date();
        expires.setTime(expires.getTime() + days * 24 * 60 * 60 * 1000);
        document.cookie = name + '=' + value + ';expires=' + expires.toUTCString() + ';path=/';
    }

    function getCookie(name) {
        const nameEQ = name + '=';
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            let cookie = cookies[i].trim();
            if (cookie.indexOf(nameEQ) === 0) {
                return cookie.substring(nameEQ.length);
            }
        }
        return null;
    }

    // Initiales Theme beim Laden anwenden
    document.addEventListener('DOMContentLoaded', initTheme);
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
